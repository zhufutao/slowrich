#:/configuration:file
name = "slowerich-backend"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

# ============================================
# D1 Database
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "slowerich-db"
database_id = "23970c3e-e48d-48d9-8293-3cf0e780e328"

# ============================================
# Queue - 回测分片计算队列
# ============================================
[[queues.producers]]
queue = "backtest-queue"
binding = "BACKTEST_QUEUE"

[[queues.consumers]]
queue = "backtest-queue"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 3
retry_delay = 5

# ============================================
# Cron Triggers - 市场温度抓取
# ============================================
[triggers]
crons = ["30 15 * * 1-5"]

# ============================================
# Environment Variables
# ============================================
[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://slowerich.pages.dev"
# Secrets (set via: wrangler secret put <NAME>)
# JWT_SECRET, REFRESH_TOKEN_SECRET, CSRF_SECRET, TUSHARE_TOKEN

# ============================================
# Dev overrides
# ============================================
[env.dev]
name = "slowerich-backend-dev"
[env.dev.vars]
ENVIRONMENT = "development"
FRONTEND_URL = "http://localhost:5173"
